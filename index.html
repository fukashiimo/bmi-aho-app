<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMIアホアプリ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff7d6;
        --ink: #1f2428;
        --muted: #62605c;
        --panel: #ffffff;
        --line: #1f2428;
        --accent: #e24d3d;
        --accent-dark: #b73429;
        --ok: #22704d;
        --warn: #a35d00;
        --danger: #9c2838;
        --blue: #2767d8;
        --yellow: #ffd84d;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(90deg, rgba(31, 36, 40, 0.07) 1px, transparent 1px),
          linear-gradient(0deg, rgba(31, 36, 40, 0.07) 1px, transparent 1px),
          linear-gradient(135deg, #fff7d6 0%, #dff4ff 48%, #ffe2d8 100%);
        background-size: 26px 26px, 26px 26px, auto;
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
        overflow-x: hidden;
      }

      main {
        width: min(100%, 560px);
        position: relative;
      }

      .app {
        background: var(--panel);
        border: 3px solid var(--line);
        border-radius: 8px;
        box-shadow: 10px 10px 0 var(--line), 0 24px 70px rgba(31, 36, 40, 0.16);
        overflow: hidden;
        position: relative;
        transform: rotate(-0.4deg);
      }

      .header {
        background:
          repeating-linear-gradient(-8deg, rgba(255, 216, 77, 0.48) 0 12px, rgba(255, 255, 255, 0) 12px 24px),
          #fff;
        padding: 28px 28px 20px;
        border-bottom: 3px solid var(--line);
        position: relative;
      }

      .header::after {
        background: var(--blue);
        border: 3px solid var(--line);
        border-radius: 999px;
        color: #fff;
        content: "BMI?";
        font-size: 13px;
        font-weight: 900;
        padding: 8px 10px;
        position: absolute;
        right: 22px;
        top: 18px;
        transform: rotate(12deg);
        animation: badge-bob 1.8s ease-in-out infinite;
      }

      h1 {
        font-size: clamp(28px, 8vw, 46px);
        line-height: 1.05;
        letter-spacing: 0;
        margin: 0 0 10px;
        text-shadow: 3px 3px 0 var(--yellow);
        transform-origin: left center;
        animation: title-wiggle 3.4s ease-in-out infinite;
      }

      p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
        margin: 0;
      }

      form {
        display: grid;
        gap: 18px;
        padding: 24px 28px 28px;
      }

      .ticker {
        background: var(--ink);
        border-bottom: 3px solid var(--line);
        color: #fff;
        font-size: 13px;
        font-weight: 900;
        overflow: hidden;
        white-space: nowrap;
      }

      .ticker span {
        display: inline-block;
        padding: 8px 0;
        animation: ticker-move 12s linear infinite;
      }

      fieldset {
        border: 0;
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
      }

      legend {
        color: #39434c;
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 8px;
        padding: 0;
      }

      .gender-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .gender-option {
        align-items: center;
        background: #f8fbff;
        border: 2px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        display: grid;
        font-size: 16px;
        gap: 10px;
        grid-template-columns: auto 1fr;
        min-height: 48px;
        padding: 10px 12px;
      }

      .gender-option:has(input:checked) {
        border-color: var(--accent);
        box-shadow: 4px 4px 0 rgba(31, 36, 40, 0.2);
        transform: translate(-2px, -2px) rotate(-1deg);
      }

      .gender-option input {
        accent-color: var(--accent);
        min-height: auto;
        width: auto;
      }

      .fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #39434c;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 48px;
        background: #fffdf5;
        border: 2px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
        font-size: 18px;
        padding: 10px 12px;
      }

      input:focus {
        border-color: var(--accent);
        outline: 4px solid rgba(226, 77, 61, 0.2);
      }

      button {
        min-height: 50px;
        border: 3px solid var(--line);
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 18px;
        font-weight: 800;
        padding: 12px 18px;
        box-shadow: 5px 5px 0 var(--line);
        transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }

      button:hover {
        background: var(--accent-dark);
        transform: translate(-2px, -2px) rotate(1deg);
        box-shadow: 7px 7px 0 var(--line);
      }

      button:active {
        transform: translate(3px, 3px) rotate(0deg);
        box-shadow: 2px 2px 0 var(--line);
      }

      .result {
        min-height: 118px;
        border: 3px solid var(--line);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 216, 77, 0.35), rgba(255, 255, 255, 0) 38%),
          #fbfaf7;
        display: grid;
        align-content: center;
        gap: 8px;
        padding: 18px;
        position: relative;
        box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.75);
      }

      .result::before {
        background: var(--yellow);
        border: 3px solid var(--line);
        border-radius: 999px;
        content: "結果";
        font-size: 12px;
        font-weight: 900;
        left: 14px;
        padding: 3px 9px;
        position: absolute;
        top: -14px;
        transform: rotate(-5deg);
      }

      .result.is-popping {
        animation: result-pop 420ms cubic-bezier(0.2, 1.5, 0.4, 1);
      }

      .message {
        font-size: clamp(26px, 7vw, 42px);
        font-weight: 900;
        line-height: 1.1;
        text-wrap: balance;
      }

      .message.too-thin {
        color: var(--accent);
      }

      .message.normal {
        color: var(--ok);
      }

      .message.warning {
        color: var(--warn);
      }

      .message.danger {
        color: var(--danger);
      }

      .detail {
        color: var(--muted);
        font-size: 14px;
      }

      .noise {
        color: rgba(31, 36, 40, 0.18);
        font-size: 48px;
        font-weight: 900;
        line-height: 1;
        pointer-events: none;
        position: absolute;
        z-index: -1;
      }

      .noise.left {
        left: -62px;
        top: 48px;
        transform: rotate(-18deg);
        animation: float-left 4.6s ease-in-out infinite;
      }

      .noise.right {
        bottom: 36px;
        right: -72px;
        transform: rotate(15deg);
        animation: float-right 4.1s ease-in-out infinite;
      }

      @keyframes title-wiggle {
        0%,
        88%,
        100% {
          transform: rotate(0deg);
        }

        91% {
          transform: rotate(-1.8deg);
        }

        94% {
          transform: rotate(1.4deg);
        }
      }

      @keyframes badge-bob {
        0%,
        100% {
          transform: translateY(0) rotate(12deg);
        }

        50% {
          transform: translateY(-7px) rotate(8deg);
        }
      }

      @keyframes ticker-move {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(-50%);
        }
      }

      @keyframes result-pop {
        0% {
          transform: scale(0.96) rotate(-1deg);
        }

        55% {
          transform: scale(1.03) rotate(1deg);
        }

        100% {
          transform: scale(1) rotate(0deg);
        }
      }

      @keyframes float-left {
        0%,
        100% {
          transform: translateY(0) rotate(-18deg);
        }

        50% {
          transform: translateY(16px) rotate(-12deg);
        }
      }

      @keyframes float-right {
        0%,
        100% {
          transform: translateY(0) rotate(15deg);
        }

        50% {
          transform: translateY(-14px) rotate(20deg);
        }
      }

      @media (max-width: 520px) {
        body {
          padding: 14px;
        }

        .header,
        form {
          padding-left: 18px;
          padding-right: 18px;
        }

        .fields {
          grid-template-columns: 1fr;
        }

        .gender-options {
          grid-template-columns: 1fr;
        }

        .app {
          box-shadow: 6px 6px 0 var(--line), 0 18px 50px rgba(31, 36, 40, 0.16);
          transform: none;
        }

        .header::after,
        .noise {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="noise left" aria-hidden="true">BMI</div>
      <div class="noise right" aria-hidden="true">判定</div>
      <section class="app" aria-labelledby="app-title">
        <div class="header">
          <h1 id="app-title">BMIアホアプリ</h1>
          <p>BMIで細かめに判定して、だいぶ余計な一言を返します。</p>
        </div>

        <div class="ticker" aria-hidden="true">
          <span>BMI判定中 BMI判定中 BMI判定中 BMI判定中 BMI判定中 BMI判定中 BMI判定中 BMI判定中&nbsp;</span>
        </div>

        <form id="bmi-form">
          <fieldset>
            <legend>性別</legend>
            <div class="gender-options">
              <label class="gender-option">
                <input type="radio" name="gender" value="male" data-default-height="171" checked>
                男
              </label>

              <label class="gender-option">
                <input type="radio" name="gender" value="female" data-default-height="158">
                女
              </label>
            </div>
          </fieldset>

          <div class="fields">
            <label>
              身長(cm)
              <input id="height" name="height" type="number" inputmode="decimal" min="1" step="0.1" value="171" required>
            </label>

            <label>
              体重(kg)
              <input id="weight" name="weight" type="number" inputmode="decimal" min="1" step="0.1" placeholder="55" required>
            </label>
          </div>

          <button type="submit">判定する</button>

          <output class="result" id="result" aria-live="polite">
            <span class="message">待機中</span>
            <span class="detail">身長と体重を待っています。</span>
          </output>
        </form>
      </section>
    </main>

    <script>
      const form = document.querySelector("#bmi-form");
      const heightInput = document.querySelector("#height");
      const weightInput = document.querySelector("#weight");
      const result = document.querySelector("#result");
      const genderInputs = document.querySelectorAll("input[name='gender']");
      const bmiJudgements = [
        {
          max: 15,
          message: "細すぎ警報ー",
          comment: "風どころか深呼吸で移動しそう。食事をイベント扱いしないで毎日やって。",
          className: "danger",
        },
        {
          max: 16,
          message: "かなり痩せすぎー",
          comment: "体重計が『もう少し数字をください』って泣いてる。ちゃんと食べよ。",
          className: "danger",
        },
        {
          max: 17,
          message: "だいぶ痩せすぎー",
          comment: "影のほうが存在感ありそう。栄養までミニマリストにしなくていい。",
          className: "too-thin",
        },
        {
          max: 18,
          message: "痩せすぎー",
          comment: "体重計に遠慮しすぎ。人生まで軽量化しなくていい。",
          className: "too-thin",
        },
        {
          max: 18.5,
          message: "ギリ痩せすぎー",
          comment: "標準の玄関前でインターホン押さずに帰ってる。あと少し食べよ。",
          className: "too-thin",
        },
        {
          max: 19,
          message: "標準入りたてじゃん！",
          comment: "ようこそ標準ゾーンへ。まだ端っこだけど入場は入場。",
          className: "normal",
        },
        {
          max: 20,
          message: "細め標準じゃん！",
          comment: "軽やかだけど標準。体重計との関係、わりと良好。",
          className: "normal",
        },
        {
          max: 21,
          message: "いい感じ標準ー",
          comment: "BMIだけ見るならかなり平和。今日は堂々と歩いていい。",
          className: "normal",
        },
        {
          max: 22,
          message: "標準ど真ん中寄り！",
          comment: "数字の収まりがいい。健康診断の紙に対して強気でいける。",
          className: "normal",
        },
        {
          max: 23,
          message: "標準じゃん！めっちゃいいじゃん！",
          comment: "BMIだけ見たらかなり優等生。今日はドヤ顔していい。",
          className: "normal",
        },
        {
          max: 24,
          message: "標準の後半ー",
          comment: "まだ標準。とはいえ油断すると境界線が手招きしてくる位置。",
          className: "normal",
        },
        {
          max: 25,
          message: "標準ギリギリー",
          comment: "標準ゾーンの出口で片足だけ外に出してる。踏みとどまれ。",
          className: "normal",
        },
        {
          max: 26,
          message: "ちょい太り気味ー",
          comment: "標準から一歩出た。まだ散歩で戻れる距離だから今のうち。",
          className: "warning",
        },
        {
          max: 27,
          message: "太り気味ー",
          comment: "ちょっと体が人生の余白を取りすぎてる。ここで止めとこ。",
          className: "warning",
        },
        {
          max: 28,
          message: "しっかり太り気味ー",
          comment: "服が先に会議を開き始める頃合い。現実と打ち合わせして。",
          className: "warning",
        },
        {
          max: 29,
          message: "だいぶ太り気味ー",
          comment: "体が『備蓄は任せろ』って顔してる。災害対策を体でやらなくていい。",
          className: "warning",
        },
        {
          max: 30,
          message: "太り過ぎ目前ー",
          comment: "境界線の上で反復横跳びしてる。そろそろ戻る方向に跳んで。",
          className: "warning",
        },
        {
          max: 32,
          message: "太り過ぎー",
          comment: "もう体重計が仕事を辞めたがってる。明日からじゃなくて今日から動こ。",
          className: "danger",
        },
        {
          max: 35,
          message: "かなり太り過ぎー",
          comment: "これは体が自分名義で増築申請してる。健康診断に先回りされる前に対策して。",
          className: "danger",
        },
        {
          max: 40,
          message: "本格的に太り過ぎー",
          comment: "体重計の上に乗るたび労災申請されそう。笑ってる場合ではあるけど対策して。",
          className: "danger",
        },
        {
          max: Infinity,
          message: "伝説級に太り過ぎー",
          comment: "BMIがラスボスみたいな数値。まずは医療と運動を味方にして攻略しよ。",
          className: "danger",
        },
      ];

      function renderResult(message, detail, className) {
        result.innerHTML = "";

        const messageElement = document.createElement("span");
        messageElement.className = `message ${className}`;
        messageElement.textContent = message;

        const detailElement = document.createElement("span");
        detailElement.className = "detail";
        detailElement.textContent = detail;

        result.append(messageElement, detailElement);
        result.classList.remove("is-popping");
        void result.offsetWidth;
        result.classList.add("is-popping");
      }

      genderInputs.forEach((genderInput) => {
        genderInput.addEventListener("change", () => {
          if (genderInput.checked) {
            heightInput.value = genderInput.dataset.defaultHeight;
          }
        });
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const heightCm = Number(heightInput.value);
        const weightKg = Number(weightInput.value);

        if (!heightCm || !weightKg || heightCm <= 0 || weightKg <= 0) {
          renderResult("ちゃんと入れてー", "身長と体重は1より大きい数値にしてください。", "");
          return;
        }

        const heightM = heightCm / 100;
        const bmi = weightKg / (heightM * heightM);
        const roundedBmi = bmi.toFixed(1);
        const judgement = bmiJudgements.find((item) => bmi < item.max);

        renderResult(judgement.message, `BMIは${roundedBmi}です。${judgement.comment}`, judgement.className);
      });
    </script>
  </body>
</html>
