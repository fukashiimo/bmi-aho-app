<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMIアホアプリ</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --ink: #1f2428;
        --muted: #65717b;
        --panel: #ffffff;
        --line: #d9e1e8;
        --accent: #e24d3d;
        --accent-dark: #b73429;
        --ok: #22704d;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #f4f7fb 0%, #eaf5f1 54%, #fff3ee 100%);
        color: var(--ink);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
      }

      .app {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 24px 70px rgba(31, 36, 40, 0.12);
        overflow: hidden;
      }

      .header {
        padding: 28px 28px 18px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        font-size: clamp(28px, 8vw, 46px);
        line-height: 1.05;
        letter-spacing: 0;
        margin: 0 0 10px;
      }

      p {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
        margin: 0;
      }

      form {
        display: grid;
        gap: 18px;
        padding: 24px 28px 28px;
      }

      fieldset {
        border: 0;
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
      }

      legend {
        color: #39434c;
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 8px;
        padding: 0;
      }

      .gender-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .gender-option {
        align-items: center;
        border: 1px solid #c8d4df;
        border-radius: 8px;
        cursor: pointer;
        display: grid;
        font-size: 16px;
        gap: 10px;
        grid-template-columns: auto 1fr;
        min-height: 48px;
        padding: 10px 12px;
      }

      .gender-option:has(input:checked) {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(226, 77, 61, 0.12);
      }

      .gender-option input {
        accent-color: var(--accent);
        min-height: auto;
        width: auto;
      }

      .fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 8px;
        color: #39434c;
        font-size: 14px;
        font-weight: 700;
      }

      input {
        width: 100%;
        min-height: 48px;
        border: 1px solid #c8c0b3;
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
        font-size: 18px;
        padding: 10px 12px;
      }

      input:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(226, 77, 61, 0.18);
      }

      button {
        min-height: 50px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 17px;
        font-weight: 800;
        padding: 12px 18px;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .result {
        min-height: 96px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfaf7;
        display: grid;
        align-content: center;
        gap: 8px;
        padding: 18px;
      }

      .message {
        font-size: clamp(26px, 7vw, 42px);
        font-weight: 900;
        line-height: 1.1;
      }

      .message.too-thin {
        color: var(--accent);
      }

      .message.normal {
        color: var(--ok);
      }

      .detail {
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 520px) {
        body {
          padding: 14px;
        }

        .header,
        form {
          padding-left: 18px;
          padding-right: 18px;
        }

        .fields {
          grid-template-columns: 1fr;
        }

        .gender-options {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="app" aria-labelledby="app-title">
        <div class="header">
          <h1 id="app-title">BMIアホアプリ</h1>
          <p>判定対象: 痩せすぎだけ</p>
        </div>

        <form id="bmi-form">
          <fieldset>
            <legend>性別</legend>
            <div class="gender-options">
              <label class="gender-option">
                <input type="radio" name="gender" value="male" data-default-height="171" checked>
                男
              </label>

              <label class="gender-option">
                <input type="radio" name="gender" value="female" data-default-height="158">
                女
              </label>
            </div>
          </fieldset>

          <div class="fields">
            <label>
              身長(cm)
              <input id="height" name="height" type="number" inputmode="decimal" min="1" step="0.1" value="171" required>
            </label>

            <label>
              体重(kg)
              <input id="weight" name="weight" type="number" inputmode="decimal" min="1" step="0.1" placeholder="55" required>
            </label>
          </div>

          <button type="submit">判定する</button>

          <output class="result" id="result" aria-live="polite">
            <span class="message">待機中</span>
            <span class="detail">身長と体重を待っています。</span>
          </output>
        </form>
      </section>
    </main>

    <script>
      const form = document.querySelector("#bmi-form");
      const heightInput = document.querySelector("#height");
      const weightInput = document.querySelector("#weight");
      const result = document.querySelector("#result");
      const genderInputs = document.querySelectorAll("input[name='gender']");

      function renderResult(message, detail, className) {
        result.innerHTML = "";

        const messageElement = document.createElement("span");
        messageElement.className = `message ${className}`;
        messageElement.textContent = message;

        const detailElement = document.createElement("span");
        detailElement.className = "detail";
        detailElement.textContent = detail;

        result.append(messageElement, detailElement);
      }

      genderInputs.forEach((genderInput) => {
        genderInput.addEventListener("change", () => {
          if (genderInput.checked) {
            heightInput.value = genderInput.dataset.defaultHeight;
          }
        });
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const heightCm = Number(heightInput.value);
        const weightKg = Number(weightInput.value);

        if (!heightCm || !weightKg || heightCm <= 0 || weightKg <= 0) {
          renderResult("ちゃんと入れてー", "身長と体重は1より大きい数値にしてください。", "");
          return;
        }

        const heightM = heightCm / 100;
        const bmi = weightKg / (heightM * heightM);
        const roundedBmi = bmi.toFixed(1);

        if (bmi < 18.5) {
          renderResult("痩せすぎー", `BMIは${roundedBmi}です。`, "too-thin");
          return;
        }

        renderResult("痩せすぎではないー", `BMIは${roundedBmi}です。`, "normal");
      });
    </script>
  </body>
</html>
